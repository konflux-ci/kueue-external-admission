name: E2E Tests

on:
  pull_request:

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Create kind cluster
        run: kind create cluster
        env:
          KIND_EXPERIMENTAL_PROVIDER: podman

      - name: Running Test e2e
        env:
          KIND_EXPERIMENTAL_PROVIDER: podman
          IMG: konflux-ci.dev/kueue-external-admission:v0.0.1
          ENABLE_COVERAGE: "true"
        run: |
          go mod tidy
          make load-image "IMG=$IMG"
          podman exec kind-control-plane crictl images
          make cert-manager
          make prometheus
          make kueue
          make test-e2e

      - name: Collect e2e coverage
        if: always()
        run: |
          mkdir -p coverage-output && chmod 777 coverage-output
          cp $HOME/.kube/config /tmp/kubeconfig && chmod 644 /tmp/kubeconfig
          podman run --rm \
            --network host \
            -v /tmp/kubeconfig:/kubeconfig:ro \
            -v $PWD/coverage-output:/workspace/coverage-output \
            -e KUBECONFIG=/kubeconfig \
            quay.io/konflux-ci/konflux-devprod/coverport-cli \
            collect \
              --namespace=kueue-external-admission \
              --label-selector="control-plane=controller-manager" \
              --test-name=e2e-tests \
              --output=/workspace/coverage-output || true

      - name: Upload e2e coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          flags: e2e-tests
          directory: coverage-output
          fail_ci_if_error: false

      - name: Cleanup e2e resources
        if: always()
        run: |
          kubectl delete pod curl-metrics -n kueue-external-admission || true
          make undeploy || true
          make uninstall || true
          kubectl delete ns kueue-external-admission || true
